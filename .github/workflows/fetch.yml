name: check-in-job

on:
  workflow_dispatch:  # 允许手动触发
  schedule:
    # 表达式生成  https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron: '0 0,6,12,18,22 * * *'  # 每天 00:00 UTC 执行，调整为你需要的时间
    - cron: '0 0 * * 0'  # 每周日执行一次保活任务
  push:
    branches: [ main, master ]  # 推送代码时触发
  pull_request:
    branches: [ main, master ]  # PR 时触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用 Node.js 24

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'  # 使用 Node.js 24

    - name: Install dependencies
      run: |
        npm install

    - name: Run scheduled check-in
      run: |
        node _worker.js  
      env:
        DOMAIN: ${{ secrets.DOMAIN }}  # 从 GitHub Secrets 中读取配置信息
        USERNAME: ${{ secrets.USERNAME }}
        PASSWORD: ${{ secrets.PASSWORD }}
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_ID: ${{ secrets.TG_ID }}

  # 👇 保活任务（关键）
  keepalive:
    runs-on: ubuntu-latest
    needs: fetch
    if: github.event_name == 'schedule'   # 只在定时触发时执行

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整的 git 历史
          persist-credentials: true  # 保持凭证

      - name: Keep repo alive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 检查当前分支
          CURRENT_BRANCH=$(git branch --show-current)
          echo "当前分支: $CURRENT_BRANCH"
          # 只有在主分支上执行保活操作
          if [ "$CURRENT_BRANCH" = "main" ] || [ "$CURRENT_BRANCH" = "master" ]; then
            # 检查是否有未推送的更改
            if git status --porcelain | grep -q .; then
              echo "有未推送的更改，跳过保活操作"
            else
              # 只有在没有未推送更改时才执行保活操作
              git commit --allow-empty -m "chore: keep alive [skip ci]"
              git push origin $CURRENT_BRANCH
            fi
          else
            echo "不在主分支上，跳过保活操作"
          fi