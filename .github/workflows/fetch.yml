name: check-in-job

on:
  workflow_dispatch:  # 允许手动触发
  schedule:
      # 表达式生成  https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron: '0 0,6,12,18,22 * * *'  # 每天 00:00 UTC 执行，调整为你需要的时间

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'  # 可以根据实际需要修改 Node.js 版本

    - name: Install dependencies
      run: |
        npm install
        npm install node-fetch

    - name: Run scheduled check-in
      run: |
        node _worker.js  
      env:
        DOMAIN: ${{ secrets.DOMAIN }}  # 从 GitHub Secrets 中读取配置信息
        USERNAME: ${{ secrets.USERNAME }}
        PASSWORD: ${{ secrets.PASSWORD }}
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_ID: ${{ secrets.TG_ID }}

  # 👇 新增：保活任务（关键）
  keepalive:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'   # 只在定时触发时执行

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Keep repo alive
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit --allow-empty -m "chore: keep alive"
          git push 